; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html



[platformio]

[env:heltec_wifi_kit_32_V3]
platform = platformio/espressif32 @ ^6.12.0
board = heltec_wifi_kit_32_V3
framework = arduino
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
upload_port = /dev/cu.usbserial-0001
monitor_port = /dev/cu.usbserial-0001
monitor_speed = 115200
; Don't toggle DTR/RTS on monitor connect — with USB CDC on boot, the default
; behavior resets the board (and we'd miss the boot output) and can also drop
; the CDC connection mid-run.
monitor_dtr = 0
monitor_rts = 0
upload_speed = 921600
debug_tool = esp-prog
build_flags = -std=c++17
              -D_GLIBCXX_USE_C99 
              -DARDUINO_HELTEC_WIFI_KIT_32=1
              -DARDUINO_HELTEC_WIFI_KIT_32_V3=1

;upload_port = /dev/cu.usbserial-4101
;debug_port = /dev/cu.usbserial-4101
lib_deps = 
    FastLED
    Adafruit GFX Library
    heltecautomation/Heltec ESP32 Dev-Boards @ ^1.1.1
    
